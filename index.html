<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#2E8C96" />
    <meta
      name="description"
      content="Send money aywhere across Africa. Earn high and stable yields powered by top ecommerce businesses."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Rift" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/rift.png" />
    <link rel="apple-touch-icon" href="/rift.png" />

    <!-- Fonts: Satoshi (body) + Clash Display (headings) via Fontshare, JetBrains Mono (numerics) via Google Fonts -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=clash-display@400,500,600,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
    />

    <!-- Farcaster Mini App Embed Meta Tags (for sharing in social feeds) -->
    <meta
      name="fc:miniapp"
      content='{"version":"1","imageUrl":"https://wallet.riftfi.xyz/hero.png","button":{"title":"💰 Open Wallet","action":{"type":"launch_miniapp","name":"Rift Wallet","url":"https://wallet.riftfi.xyz","splashImageUrl":"https://wallet.riftfi.xyz/rift.png","splashBackgroundColor":"#2E8C96"}}}'
    />
    <!-- For backward compatibility -->
    <meta
      name="fc:frame"
      content='{"version":"1","imageUrl":"https://wallet.riftfi.xyz/hero.png","button":{"title":"💰 Open Wallet","action":{"type":"launch_frame","name":"Rift Wallet","url":"https://wallet.riftfi.xyz","splashImageUrl":"https://wallet.riftfi.xyz/rift.png","splashBackgroundColor":"#2E8C96"}}}'
    />

    <title>Rift - Payment Solutions</title>
  </head>
  <body oncontextmenu="return false">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
